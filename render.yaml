services:
  # Backend API
  - type: web
    name: skool-backend
    runtime: python
    repo: https://github.com/eclipsesolaire/skool-translation
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --preload --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: FLASK_ENV
        value: production
    autoDeploy: true

  # Frontend
  - type: web
    name: skool-frontend
    runtime: static
    repo: https://github.com/eclipsesolaire/skool-translation
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://skool-backend-h3kb.onrender.com