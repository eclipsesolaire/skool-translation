services:
  # Backend API
  - type: web
    name: skool-backend
    runtime: python
    repo: https://github.com/VOTRE_USERNAME/skool-translation
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --bind 0.0.0.0:$PORT --preload --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production

  # Frontend (si votre frontend est dans le même repo)
  - type: web
    name: skool-frontend
    runtime: static
    repo: https://github.com/VOTRE_USERNAME/skool-translation
    buildCommand: npm install && npm run build
    staticPublishDir: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://skool-backend.onrender.com